# Secret: GITHUB_CONTRIBUTIONS_PAT (Settings → Secrets and variables → Actions)

name: Update GitHub contributions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch contribution calendar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_CONTRIBUTIONS_PAT }}
        run: node Portoflio/scripts/fetch-contributions.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Portoflio/public/contributions.json
          if git diff --staged --quiet; then
            echo "No changes to contributions.json"
          else
            git commit -m "chore: refresh GitHub contribution data"
            git push
          fi
